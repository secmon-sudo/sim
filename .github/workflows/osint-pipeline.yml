name: SIM OSINT Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch: {}       # Manual trigger

concurrency:
  group: sim-pipeline
  cancel-in-progress: false   # NEVER cancel running pipelines

env:
  GROQ_API_KEY_A:       ${{ secrets.GROQ_API_KEY_A }}
  GROQ_API_KEY_B:       ${{ secrets.GROQ_API_KEY_B }}
  OPENROUTER_API_KEY_A: ${{ secrets.OPENROUTER_API_KEY_A }}
  OPENROUTER_API_KEY_B: ${{ secrets.OPENROUTER_API_KEY_B }}
  DATABASE_URL:         ${{ secrets.DATABASE_URL }}
  TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_ARCHIVE_CHAT_ID: ${{ secrets.TELEGRAM_ARCHIVE_CHAT_ID }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        run: python -m src.pipeline.orchestrator

      - name: Upload telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_id }}
          path: logs/
          retention-days: 7
