name: SIM OSINT Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours (unreliable — cron-job.org dispatch is the backstop;
                           # back-to-back double-triggers are absorbed by the orchestrator's
                           # 90-min run-spacing guard, see MIN_RUN_SPACING_MINUTES)
  workflow_dispatch:       # Manual / cron-job.org trigger
    inputs:
      force:
        description: "Spacing guard'ı atla (son koşu yakın olsa bile zorla çalıştır)"
        type: boolean
        default: false

concurrency:
  group: sim-pipeline
  cancel-in-progress: false   # NEVER cancel running pipelines

env:
  GROQ_API_KEY_A:       ${{ secrets.GROQ_API_KEY_A }}
  GROQ_API_KEY_B:       ${{ secrets.GROQ_API_KEY_B }}
  OPENROUTER_API_KEY_A: ${{ secrets.OPENROUTER_API_KEY_A }}
  OPENROUTER_API_KEY_B: ${{ secrets.OPENROUTER_API_KEY_B }}
  GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
  MISTRAL_API_KEY:      ${{ secrets.MISTRAL_API_KEY }}
  CEREBRAS_API_KEY:     ${{ secrets.CEREBRAS_API_KEY }}
  DATABASE_URL:         ${{ secrets.DATABASE_URL }}
  TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_ALERTS_CHAT_ID: ${{ secrets.TELEGRAM_ALERTS_CHAT_ID }}
  TELEGRAM_ARCHIVE_CHAT_ID: ${{ secrets.TELEGRAM_ARCHIVE_CHAT_ID }}
  R2_ACCOUNT_ID:        ${{ secrets.R2_ACCOUNT_ID }}
  R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  SIM_MATURATION_WINDOW_HOURS: 0  # Skip maturation wait in CI — classify immediately
  PIPELINE_FORCE_RUN: ${{ inputs.force && '1' || '0' }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    # 55: healthy runs already peak at ~27 min; at 30 a slow LLM day or a DB
    # lock wait got runs SIGKILLed before telemetry was written, which is what
    # paged the dead-man's switch on 2026-07-13. Still well under the 2h cadence.
    timeout-minutes: 55

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DB migrations
        run: |
          python -c "
          import os, glob, psycopg
          db_url = os.environ['DATABASE_URL']
          conn = psycopg.connect(db_url, autocommit=True)
          for sql_file in sorted(glob.glob('db/migrations/*.sql')):
              print(f'Running {sql_file}...')
              with open(sql_file) as f:
                  try:
                      conn.execute(f.read())
                      print(f'  OK')
                  except Exception as e:
                      print(f'  SKIP ({e})')
          conn.close()
          print('Migrations complete')
          "

      - name: Seed anchor data
        run: python db/seed_anchors.py --file db/anchors.json

      - name: Run Pipeline
        run: python -m src.pipeline.orchestrator

      - name: Upload telemetry artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-run-${{ github.run_id }}
          path: logs/
          retention-days: 7
